name: Build ZukiSU Manager

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'website/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Keystore
        working-directory: manager
        run: |
          keytool -genkeypair -v -keystore ci-keystore.jks -alias zukisu -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=CI, OU=ZukiSU, O=ZukiSU, L=Unknown, S=Unknown, C=US"
          echo "KEYSTORE_FILE=ci-keystore.jks" > signing.properties
          echo "KEYSTORE_PASSWORD=android" >> signing.properties
          echo "KEY_ALIAS=zukisu" >> signing.properties
          echo "KEY_PASSWORD=android" >> signing.properties

      - name: Build Manager APK
        working-directory: manager
        run: |
          echo "android.sdk.channel=3" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          ./gradlew :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZukiSU-Ultra-APK
          path: manager/app/build/outputs/apk/release/*.apk
          compression-level: 9